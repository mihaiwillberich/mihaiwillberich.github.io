<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice" role="img">
  <defs>
    <linearGradient id="paint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a070a"/>
      <stop offset="48%" stop-color="#5a1220"/>
      <stop offset="100%" stop-color="#120407"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0.2">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="48%" stop-color="#ff9fb0" stop-opacity="0.16"/>
      <stop offset="53%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#ff9fb0" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
