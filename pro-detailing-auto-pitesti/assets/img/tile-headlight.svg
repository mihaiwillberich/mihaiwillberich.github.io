  </g>
  <path d="M60,300 Q300,240 540,300 Q300,360 60,300 Z" fill="none" stroke="#9bedff" stroke-opacity="0.4" stroke-width="2"/>
  <path d="M130,300 Q300,270 470,300 Q300,330 130,300 Z" fill="none" stroke="#9bedff" stroke-opacity="0.55" stroke-width="1.5"/>
  <rect width="600" height="600" fill="url(#vign)"/>
